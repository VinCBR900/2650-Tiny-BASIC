name: Build and Deploy Browser Runner

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Emscripten docs site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Show Emscripten version
        run: emcc --version

      - name: Build native tools
        run: |
          make -C tools clean
          make -C tools

      - name: Build browser assets
        run: |
          make -C docs clean
          make -C docs all

      - name: Verify browser assets
        run: |
          test -s docs/index.html
          test -s docs/assets/uBASIC2650.hex
          test -s docs/assets/pipbug_wrap.js
          test -s docs/assets/pipbug_wrap.wasm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
